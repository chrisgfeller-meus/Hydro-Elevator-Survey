<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Elevator Survey</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./styles.css">
    <style>
        /* Add photo styles directly here */
        .photo-field-container {
            margin-top: 8px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 6px;
        }
        
        .photo-field-btn {
            padding: 6px 12px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 4px;
            font-size: 0.9em;
            cursor: pointer;
        }
        
        .photo-thumbnails {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .photo-thumbnail {
            position: relative;
            width: 60px;
            height: 60px;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .photo-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .remove-photo {
            position: absolute;
            top: 2px;
            right: 2px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Elevator Survey</h1>
            <button id="menuBtn" class="menu-btn">☰</button>
        </header>

        <nav id="sideMenu" class="side-menu">
            <button class="close-menu" id="closeMenu">×</button>
            <ul>
                <li><a href="#" data-section="project">Project Info</a></li>
                <li><a href="#" data-section="machine-room">Machine Room</a></li>
                <li><a href="#" data-section="car">Car Equipment</a></li>
                <li><a href="#" data-section="hoistway">Hoistway</a></li>
                <li><a href="#" data-section="pit">Pit Equipment</a></li>
                <li><a href="#" data-section="elevations">Elevations</a></li>
                <li><a href="#" data-section="export">Export Data</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <!-- Project Info with Photo Options -->
            <section id="project" class="survey-section active">
                <h2>Project Information</h2>
                
                <div class="form-group">
                    <label>State Number</label>
                    <input type="text" id="stateNumber">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('stateNumber')">📷 Add Photo</button>
                        <input type="file" id="photo-stateNumber" accept="image/*" style="display:none;" onchange="handlePhoto('stateNumber', this)">
                        <div class="photo-thumbnails" id="thumbs-stateNumber"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Building Name</label>
                    <input type="text" id="building">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('building')">📷 Add Photo</button>
                        <input type="file" id="photo-building" accept="image/*" style="display:none;" onchange="handlePhoto('building', this)">
                        <div class="photo-thumbnails" id="thumbs-building"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address"></textarea>
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('address')">📷 Add Photo</button>
                        <input type="file" id="photo-address" accept="image/*" style="display:none;" onchange="handlePhoto('address', this)">
                        <div class="photo-thumbnails" id="thumbs-address"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Number of Cars</label>
                    <input type="number" id="cars" value="1">
                </div>
                
                <div class="form-group">
                    <label>Type</label>
                    <select id="elevatorType">
                        <option>Hydraulic</option>
                        <option>Traction</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Stops</label>
                    <input type="number" id="stops">
                </div>
                
                <div class="form-group">
                    <label>Speed (FPM)</label>
                    <input type="number" id="fpm">
                </div>
                
                <div class="form-group">
                    <label>Capacity (lbs)</label>
                    <input type="number" id="capacity">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('capacity')">📷 Add Photo</button>
                        <input type="file" id="photo-capacity" accept="image/*" style="display:none;" onchange="handlePhoto('capacity', this)">
                        <div class="photo-thumbnails" id="thumbs-capacity"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Piston Type</label>
                    <input type="text" id="pistonType">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('pistonType')">📷 Add Photo</button>
                        <input type="file" id="photo-pistonType" accept="image/*" style="display:none;" onchange="handlePhoto('pistonType', this)">
                        <div class="photo-thumbnails" id="thumbs-pistonType"></div>
                    </div>
                </div>
            </section>

            <!-- Machine Room with Photos -->
            <section id="machine-room" class="survey-section">
                <h2>Machine Room</h2>
                
                <div class="form-group">
                    <label>Motor Brand</label>
                    <input type="text" id="motorBrand">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('motorBrand')">📷 Add Photo</button>
                        <input type="file" id="photo-motorBrand" accept="image/*" style="display:none;" onchange="handlePhoto('motorBrand', this)">
                        <div class="photo-thumbnails" id="thumbs-motorBrand"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Voltage</label>
                    <input type="text" id="motorVoltage">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('motorVoltage')">📷 Add Photo</button>
                        <input type="file" id="photo-motorVoltage" accept="image/*" style="display:none;" onchange="handlePhoto('motorVoltage', this)">
                        <div class="photo-thumbnails" id="thumbs-motorVoltage"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>HP</label>
                    <input type="text" id="motorHP">
                </div>
                
                <div class="form-group">
                    <label>Controller Type</label>
                    <input type="text" id="controllerType">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('controllerType')">📷 Add Photo</button>
                        <input type="file" id="photo-controllerType" accept="image/*" style="display:none;" onchange="handlePhoto('controllerType', this)">
                        <div class="photo-thumbnails" id="thumbs-controllerType"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Tank Size</label>
                    <input type="text" id="tankSize">
                </div>
            </section>

            <!-- Car Equipment with Photos -->
            <section id="car" class="survey-section">
                <h2>Car Equipment</h2>
                
                <div class="form-group">
                    <label>Car Weight</label>
                    <input type="text" id="carWeight">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('carWeight')">📷 Add Photo</button>
                        <input type="file" id="photo-carWeight" accept="image/*" style="display:none;" onchange="handlePhoto('carWeight', this)">
                        <div class="photo-thumbnails" id="thumbs-carWeight"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Door Operator</label>
                    <input type="text" id="doorBrand">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('doorBrand')">📷 Add Photo</button>
                        <input type="file" id="photo-doorBrand" accept="image/*" style="display:none;" onchange="handlePhoto('doorBrand', this)">
                        <div class="photo-thumbnails" id="thumbs-doorBrand"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Opening Type</label>
                    <select id="openingType">
                        <option>Single Speed</option>
                        <option>Center Opening</option>
                        <option>Two Speed</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Cab Interiors</label>
                    <textarea id="cabInteriors"></textarea>
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('cabInteriors')">📷 Add Photo</button>
                        <input type="file" id="photo-cabInteriors" accept="image/*" style="display:none;" onchange="handlePhoto('cabInteriors', this)">
                        <div class="photo-thumbnails" id="thumbs-cabInteriors"></div>
                    </div>
                </div>
            </section>

            <!-- Hoistway with Photos -->
            <section id="hoistway" class="survey-section">
                <h2>Hoistway</h2>
                
                <div class="form-group">
                    <label>Opening Width</label>
                    <input type="text" id="openingWidth">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('openingWidth')">📷 Add Photo</button>
                        <input type="file" id="photo-openingWidth" accept="image/*" style="display:none;" onchange="handlePhoto('openingWidth', this)">
                        <div class="photo-thumbnails" id="thumbs-openingWidth"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Opening Height</label>
                    <input type="text" id="openingHeight">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('openingHeight')">📷 Add Photo</button>
                        <input type="file" id="photo-openingHeight" accept="image/*" style="display:none;" onchange="handlePhoto('openingHeight', this)">
                        <div class="photo-thumbnails" id="thumbs-openingHeight"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Rail Size</label>
                    <input type="text" id="railSize">
                </div>
                
                <div class="form-group">
                    <label>Hall Buttons</label>
                    <input type="number" id="hallButtons">
                </div>
            </section>

            <!-- Pit with Photos -->
            <section id="pit" class="survey-section">
                <h2>Pit Equipment</h2>
                
                <div class="form-group">
                    <label>Buffer Car</label>
                    <input type="text" id="bufferCar">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('bufferCar')">📷 Add Photo</button>
                        <input type="file" id="photo-bufferCar" accept="image/*" style="display:none;" onchange="handlePhoto('bufferCar', this)">
                        <div class="photo-thumbnails" id="thumbs-bufferCar"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Ladder</label>
                    <select id="pitLadder">
                        <option>Yes</option>
                        <option>No</option>
                        <option>Needs Repair</option>
                    </select>
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('pitLadder')">📷 Add Photo</button>
                        <input type="file" id="photo-pitLadder" accept="image/*" style="display:none;" onchange="handlePhoto('pitLadder', this)">
                        <div class="photo-thumbnails" id="thumbs-pitLadder"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Stop Switch</label>
                    <select id="stopSwitch">
                        <option>Working</option>
                        <option>Not Working</option>
                    </select>
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('stopSwitch')">📷 Add Photo</button>
                        <input type="file" id="photo-stopSwitch" accept="image/*" style="display:none;" onchange="handlePhoto('stopSwitch', this)">
                        <div class="photo-thumbnails" id="thumbs-stopSwitch"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Piston Size</label>
                    <input type="text" id="pistonSize">
                    <div class="photo-field-container">
                        <button type="button" class="photo-field-btn" onclick="selectPhoto('pistonSize')">📷 Add Photo</button>
                        <input type="file" id="photo-pistonSize" accept="image/*" style="display:none;" onchange="handlePhoto('pistonSize', this)">
                        <div class="photo-thumbnails" id="thumbs-pistonSize"></div>
                    </div>
                </div>
            </section>

            <!-- Elevations -->
            <section id="elevations" class="survey-section">
                <h2>Elevations</h2>
                <button id="addFloor" class="btn-primary">Add Floor</button>
                <div id="floorsContainer"></div>
            </section>

            <!-- Export with ALL Options -->
            <section id="export" class="survey-section">
                <h2>Export Data</h2>
                <div class="export-options" style="display: flex; flex-direction: column; gap: 10px;">
                    <button id="saveLocal" class="btn-primary" onclick="saveProject()">💾 Save Project</button>
                    <button id="exportJSON" class="btn-secondary" onclick="exportJSON()">📄 Export as JSON</button>
                    <button id="exportCSV" class="btn-secondary" onclick="exportCSV()">📊 Export as CSV</button>
                    <button id="exportHTML" class="btn-primary" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%);" onclick="exportHTML()">📑 Export HTML Report with Photos</button>
                    <button id="emailReport" class="btn-secondary" onclick="emailReport()">✉️ Email Report Summary</button>
                </div>
                <div id="savedSurveys" class="saved-surveys">
                    <h3>Saved Projects</h3>
                    <ul id="surveysList"></ul>
                </div>
            </section>
        </main>

        <div class="photo-capture">
            <button id="photoBtn" class="photo-btn">📷</button>
            <input type="file" id="photoInput" accept="image/*" capture="camera" style="display: none;">
        </div>
    </div>

    <script>
        // Photo storage
        let photos = {};
        
        // Navigation
        document.addEventListener('DOMContentLoaded', function() {
            console.log('App starting...');
            
            // Menu toggle
            const menuBtn = document.getElementById('menuBtn');
            const sideMenu = document.getElementById('sideMenu');
            const closeMenu = document.getElementById('closeMenu');
            
            if (menuBtn) {
                menuBtn.addEventListener('click', function() {
                    sideMenu.classList.add('active');
                });
            }
            
            if (closeMenu) {
                closeMenu.addEventListener('click', function() {
                    sideMenu.classList.remove('active');
                });
            }
            
            // Section navigation
            const menuLinks = document.querySelectorAll('.side-menu a');
            menuLinks.forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const sectionName = this.getAttribute('data-section');
                    
                    // Hide all sections
                    document.querySelectorAll('.survey-section').forEach(function(section) {
                        section.classList.remove('active');
                    });
                    
                    // Show selected section
                    const targetSection = document.getElementById(sectionName);
                    if (targetSection) {
                        targetSection.classList.add('active');
                    }
                    
                    sideMenu.classList.remove('active');
                });
            });
            
            // Load saved data
            loadSavedData();
            loadProjects();
            
            // Save on change
            const inputs = document.querySelectorAll('input, select, textarea');
            inputs.forEach(function(input) {
                if (!input.type.includes('file')) {
                    input.addEventListener('change', saveData);
                }
            });
            
            // Floor functionality
            const addFloorBtn = document.getElementById('addFloor');
            if (addFloorBtn) {
                let floorCount = 0;
                addFloorBtn.addEventListener('click', function() {
                    floorCount++;
                    const floorsContainer = document.getElementById('floorsContainer');
                    const floorDiv = document.createElement('div');
                    floorDiv.className = 'floor-item';
                    floorDiv.style.padding = '10px';
                    floorDiv.style.margin = '10px 0';
                    floorDiv.style.background = '#f9f9f9';
                    floorDiv.style.borderRadius = '8px';
                    floorDiv.innerHTML = `
                        <h4>Floor ${floorCount}</h4>
                        <div class="form-group">
                            <label>Floor Label</label>
                            <input type="text" id="floor${floorCount}_label">
                        </div>
                        <div class="form-group">
                            <label>Floor Height</label>
                            <input type="text" id="floor${floorCount}_height">
                        </div>
                        <button onclick="this.parentElement.remove()">Remove Floor</button>
                    `;
                    floorsContainer.appendChild(floorDiv);
                });
            }
        });
        
        // Photo functions
        function selectPhoto(fieldId) {
            document.getElementById('photo-' + fieldId).click();
        }
        
        function handlePhoto(fieldId, input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                if (!photos[fieldId]) photos[fieldId] = [];
                
                const photoData = {
                    id: Date.now(),
                    data: e.target.result,
                    timestamp: new Date().toISOString()
                };
                
                photos[fieldId].push(photoData);
                updateThumbnails(fieldId);
                saveData();
            };
            reader.readAsDataURL(file);
        }
        
        function updateThumbnails(fieldId) {
            const container = document.getElementById('thumbs-' + fieldId);
            if (!container) return;
            
            container.innerHTML = '';
            const fieldPhotos = photos[fieldId] || [];
            
            fieldPhotos.forEach(function(photo, index) {
                const thumb = document.createElement('div');
                thumb.className = 'photo-thumbnail';
                thumb.innerHTML = `
                    <img src="${photo.data}" onclick="viewPhoto('${fieldId}', ${index})">
                    <button class="remove-photo" onclick="removePhoto('${fieldId}', ${index})">×</button>
                `;
                container.appendChild(thumb);
            });
        }
        
        function removePhoto(fieldId, index) {
            if (photos[fieldId]) {
                photos[fieldId].splice(index, 1);
                if (photos[fieldId].length === 0) delete photos[fieldId];
                updateThumbnails(fieldId);
                saveData();
            }
        }
        
        function viewPhoto(fieldId, index) {
            const photo = photos[fieldId][index];
            window.open(photo.data, '_blank');
        }
        
        // Save and Load functions
        function saveData() {
            const data = {};
            document.querySelectorAll('input, select, textarea').forEach(function(input) {
                if (input.id && !input.type.includes('file')) {
                    data[input.id] = input.value;
                }
            });
            
            const surveyData = {
                formData: data,
                photos: photos,
                timestamp: new Date().toISOString()
            };
            
            localStorage.setItem('currentSurvey', JSON.stringify(surveyData));
            console.log('Data saved');
        }
        
        function loadSavedData() {
            const saved = localStorage.getItem('currentSurvey');
            if (!saved) return;
            
            const surveyData = JSON.parse(saved);
            
            // Load form data
            if (surveyData.formData) {
                Object.keys(surveyData.formData).forEach(function(key) {
                    const element = document.getElementById(key);
                    if (element) element.value = surveyData.formData[key];
                });
            }
            
            // Load photos
            if (surveyData.photos) {
                photos = surveyData.photos;
                Object.keys(photos).forEach(function(fieldId) {
                    updateThumbnails(fieldId);
                });
            }
        }
        
        // Export functions
        function exportJSON() {
            const saved = localStorage.getItem('currentSurvey') || '{}';
            const blob = new Blob([saved], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'elevator_survey_' + Date.now() + '.json';
            a.click();
        }
        
        function exportCSV() {
            let csv = 'Field,Value,Has Photos\n';
            const saved = JSON.parse(localStorage.getItem('currentSurvey') || '{}');
            
            if (saved.formData) {
                Object.keys(saved.formData).forEach(function(key) {
                    const value = saved.formData[key];
                    const hasPhotos = photos[key] ? 'Yes' : 'No';
                    csv += `"${key}","${value}","${hasPhotos}"\n`;
                });
            }
            
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'elevator_survey_' + Date.now() + '.csv';
            a.click();
        }
        
        function exportHTML() {
            const saved = JSON.parse(localStorage.getItem('currentSurvey') || '{}');
            
            let html = `<!DOCTYPE html>
<html>
<head>
    <title>Elevator Survey Report</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        h1 { color: #667eea; }
        .section { margin: 20px 0; padding: 15px; background: #f5f5f5; }
        .field { margin: 10px 0; }
        .label { font-weight: bold; }
        .photos { margin: 10px 0; }
        img { max-width: 300px; margin: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Elevator Survey Report</h1>
    <p>Generated: ${new Date().toLocaleString()}</p>`;
            
            if (saved.formData) {
                html += '<div class="section">';
                Object.keys(saved.formData).forEach(function(key) {
                    if (saved.formData[key]) {
                        html += `<div class="field"><span class="label">${key}:</span> ${saved.formData[key]}</div>`;
                        
                        if (photos[key] && photos[key].length > 0) {
                            html += '<div class="photos">Photos:<br>';
                            photos[key].forEach(function(photo) {
                                html += `<img src="${photo.data}">`;
                            });
                            html += '</div>';
                        }
                    }
                });
                html += '</div>';
            }
            
            html += '</body></html>';
            
            const blob = new Blob([html], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'elevator_report_' + Date.now() + '.html';
            a.click();
        }
        
        function emailReport() {
            const saved = JSON.parse(localStorage.getItem('currentSurvey') || '{}');
            let body = 'ELEVATOR SURVEY REPORT\n\n';
            
            if (saved.formData) {
                Object.keys(saved.formData).forEach(function(key) {
                    if (saved.formData[key]) {
                        body += `${key}: ${saved.formData[key]}\n`;
                    }
                });
            }
            
            body += '\n\nNote: Use Export HTML option for complete report with photos.';
            
            window.location.href = 'mailto:?subject=Elevator Survey Report&body=' + encodeURIComponent(body);
        }
        
        function saveProject() {
            const projectName = document.getElementById('building').value || 'Project ' + Date.now();
            const projectId = 'project_' + Date.now();
            
            const projects = JSON.parse(localStorage.getItem('savedProjects') || '{}');
            projects[projectId] = {
                name: projectName,
                data: localStorage.getItem('currentSurvey'),
                timestamp: new Date().toISOString()
            };
            
            localStorage.setItem('savedProjects', JSON.stringify(projects));
            loadProjects();
            alert('Project saved: ' + projectName);
        }
        
        function loadProjects() {
            const projects = JSON.parse(localStorage.getItem('savedProjects') || '{}');
            const list = document.getElementById('surveysList');
            if (!list) return;
            
            list.innerHTML = '';
            Object.keys(projects).forEach(function(id) {
                const li = document.createElement('li');
                li.style.padding = '10px';
                li.style.borderBottom = '1px solid #ddd';
                li.innerHTML = `
                    ${projects[id].name} - ${new Date(projects[id].timestamp).toLocaleDateString()}
                    <button onclick="loadProject('${id}')" style="margin-left:10px;">Load</button>
                    <button onclick="deleteProject('${id}')">Delete</button>
                `;
                list.appendChild(li);
            });
        }
        
        function loadProject(id) {
            const projects = JSON.parse(localStorage.getItem('savedProjects') || '{}');
            if (projects[id]) {
                localStorage.setItem('currentSurvey', projects[id].data);
                loadSavedData();
                alert('Project loaded: ' + projects[id].name);
            }
        }
        
        function deleteProject(id) {
            if (confirm('Delete this project?')) {
                const projects = JSON.parse(localStorage.getItem('savedProjects') || '{}');
                delete projects[id];
                localStorage.setItem('savedProjects', JSON.stringify(projects));
                loadProjects();
            }
        }
    </script>
</body>
</html>
